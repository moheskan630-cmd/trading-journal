<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>☠️ نهاية العالم 2- كشف السيولة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: #e8eaed;
      font-family: Tahoma, sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 14px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    h1 {
      text-align: center;
      color: #ff4444;
      margin-bottom: 20px;
    }

    input,
    button {
      width: 100%;
      height: 48px;
      padding: 0 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    input {
      background: #2b2b2b;
      color: #fff;
    }

    input::placeholder {
      color: #aaa;
    }

    button.calc {
      background: #ff4444;
      color: #000;
      cursor: pointer;
    }

    button.calc:hover {
      background: #ff0000;
    }

    button.back {
      background: #fbbc04;
      color: #000;
      cursor: pointer;
    }

    button.back:hover {
      background: #ffd54f;
    }

    .section {
      margin-bottom: 15px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .green { color: #34c759; }
    .red   { color: #ff3b30; }

    .value {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 6px;
    }

    .value input {
      width: 70px;
      height: 28px;
      font-size: 12px;
      margin: 0 5px;
    }

    .value button {
      width: 30px;
      height: 28px;
      font-size: 14px;
      padding: 0;
      margin: 0 2px;
    }

    .max {
      font-weight: bold;
      text-shadow: 0 0 6px rgba(52,199,89,0.6);
    }

    hr {
      border: none;
      height: 1px;
      background: #333;
      margin: 18px 0;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>☠️ كشف السيولة</h1>

  <input type="number" id="x" placeholder="أدخل X" step="any">
  <input type="number" id="y" placeholder="أدخل Y" step="any">

  <button class="calc" onclick="calcLiquidity()">كشف السيولة</button>

  <div id="results"></div>

  <button class="back" onclick="goHome()">🏠 العودة إلى الصفحة الرئيسية</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

function calcLiquidity() {
  const x = parseFloat(document.getElementById("x").value);
  const y = parseFloat(document.getElementById("y").value);

  if (isNaN(x) || isNaN(y)) {
    alert("يرجى إدخال قيم صحيحة أو عشرية");
    return;
  }

  const a = x - y;
  const levels = [0.236, 0.382, 0.5, 0.618, 0.786];

  let counter = 0;

  function createEditableValue(value, colorClass) {
    counter++;
    return `
      <div class="value ${colorClass}">
        <span id="val${counter}">${value.toFixed(4)}</span>
        <input type="number" id="edit${counter}" step="any">
        <button onclick="modifyValue('val${counter}','edit${counter}','add')">+</button>
        <button onclick="modifyValue('val${counter}','edit${counter}','sub')">-</button>
      </div>
    `;
  }

  let html = `<div class="section"><strong>a = ${a.toFixed(4)}</strong></div><hr>`;

  html += `<div class="section"><div class="title red">⬇️ أسفل X</div>`;
  levels.forEach(l => {
    html += createEditableValue(x - a * l, "red");
  });
  html += `</div>`;

  html += `<div class="section"><div class="title green">⬆️ أعلى X</div>`;
  levels.forEach(l => {
    html += createEditableValue(x + a * l, "green");
  });
  html += createEditableValue(x + a * 1.5, "green max");
  html += `</div><hr>`;

  html += `<div class="section"><div class="title green">⬇️ أسفل Y</div>`;
  levels.forEach(l => {
    html += createEditableValue(y - a * l, "green");
  });
  html += createEditableValue(y - a * 1.5, "green max");
  html += `</div>`;

  html += `<div class="section"><div class="title red">⬆️ أعلى Y</div>`;
  levels.forEach(l => {
    html += createEditableValue(y + a * l, "red");
  });
  html += `</div>`;

  document.getElementById("results").innerHTML = html;
}

function modifyValue(valueId, inputId, operation) {
  let valueElement = document.getElementById(valueId);
  let inputElement = document.getElementById(inputId);

  let current = parseFloat(valueElement.innerText);
  let change = parseFloat(inputElement.value);

  if (isNaN(change)) {
    alert("ادخل رقم صحيح");
    return;
  }

  if (operation === "add") {
    current += change;
  } else {
    current -= change;
  }

  valueElement.innerText = current.toFixed(4);
  inputElement.value = "";
}
</script>

</body>
</html>
