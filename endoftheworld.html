<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>☠️ نهاية العالم - كشف السيولة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: #e8eaed;
      font-family: Tahoma, sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 14px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    h1 {
      text-align: center;
      color: #ff4444;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .calc {
      background: #ff4444;
      color: #000;
    }

    .back {
      background: #fbbc04;
      color: #000;
    }

    .section {
      margin-bottom: 15px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .green { color: #34c759; }
    .red   { color: #ff3b30; }

    .value {
      font-size: 14px;
      line-height: 1.7;
    }

    .max {
      font-weight: bold;
      text-shadow: 0 0 6px rgba(52,199,89,0.6);
    }

    .max-red {
      font-weight: bold;
      text-shadow: 0 0 6px rgba(255,59,48,0.6);
    }

    hr {
      border: none;
      height: 1px;
      background: #333;
      margin: 18px 0;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>☠️ كشف السيولة</h1>

  <input type="number" id="x" placeholder="أدخل X" step="any">
  <input type="number" id="y" placeholder="أدخل Y" step="any">

  <button class="calc" onclick="calcLiquidity()">كشف السيولة</button>

  <div id="results"></div>

  <!-- زر العودة أسفل التطبيق -->
  <button class="back" onclick="goHome()">🏠 العودة إلى الصفحة الرئيسية</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

function calcLiquidity() {
  const x = parseFloat(document.getElementById("x").value);
  const y = parseFloat(document.getElementById("y").value);

  if (isNaN(x) || isNaN(y)) {
    alert("يرجى إدخال قيم صحيحة أو عشرية");
    return;
  }

  const a = x - y;
  const levels = [0.236, 0.382, 0.5, 0.618, 0.786];

  let html = `<div class="section"><strong>a = ${a.toFixed(4)}</strong></div><hr>`;

  // ⬇️ أسفل X (أحمر)
  html += `<div class="section">
            <div class="title red">⬇️ أسفل X</div>`;
  levels.forEach(l => {
    html += `<div class="value red">${(x - a * l).toFixed(4)}</div>`;
  });
  html += `</div>`;

  // ⬆️ أعلى X (أخضر + ماكس)
  html += `<div class="section">
            <div class="title green">⬆️ أعلى X</div>`;
  levels.forEach(l => {
    html += `<div class="value green">${(x + a * l).toFixed(4)}</div>`;
  });
  html += `<div class="value green max">🔥 ماكس: ${(x + a * 1.5).toFixed(4)}</div>`;
  html += `</div><hr>`;

  // ⬇️ أسفل Y (أخضر + ماكس)
  html += `<div class="section">
            <div class="title green">⬇️ أسفل Y</div>`;
  levels.forEach(l => {
    html += `<div class="value green">${(y - a * l).toFixed(4)}</div>`;
  });
  html += `<div class="value green max">🔥 ماكس: ${(y - a * 1.5).toFixed(4)}</div>`;
  html += `</div>`;

  // ⬆️ أعلى Y (أحمر)
  html += `<div class="section">
            <div class="title red">⬆️ أعلى Y</div>`;
  levels.forEach(l => {
    html += `<div class="value red">${(y + a * l).toFixed(4)}</div>`;
  });
  html += `</div>`;

  document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
