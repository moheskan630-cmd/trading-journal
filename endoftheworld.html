<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>نهاية العالم</title>
  <style>
    body {
      background: radial-gradient(circle, #1a0000, #000);
      color: #ff4444;
      font-family: Tahoma, sans-serif;
      direction: rtl;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      color: #ddd;
      max-width: 600px;
      line-height: 1.8;
    }
    button {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff4444;
      color: #000;
      cursor: pointer;
    }
    button:hover {
      background: #ff0000;
    }
  </style>
</head>
<body>

  <div>
    <h1>☠️ نهاية العالم</h1>
    <p>
      عندما تختفي السيولة،  
      وتنهار الدعوم،  
      وتكسر المقاومات بلا رحمة…  
      اعلم أن إدارة المخاطر هي آخر ملجأ لك.
    </p>
    <button onclick="history.back()">🔙 رجوع</button>
  </div>

</body>
</html>
