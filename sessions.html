<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنبيهات الذهب</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Tahoma;
  background:#0a0a0f;
  color:#fff;
  padding:20px;
  max-width:500px;
  margin:auto;
}
h1{text-align:center;color:#f0c040;margin-bottom:15px}

.box{
  border:1px solid #222;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

.price{
  font-size:2.5rem;
  color:#f0c040;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#f0c040;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.alert{
  padding:8px;
  border-bottom:1px solid #222;
}
</style>
</head>

<body>

<h1>🥇 تنبيهات الذهب</h1>

<div class="box" id="status">جاري الاتصال...</div>

<div class="box">
  <div>السعر الحالي</div>
  <div class="price" id="price">—</div>
</div>

<div class="box">
  <div>إضافة تنبيه</div>

  <select id="dir">
    <option value="above">فوق السعر</option>
    <option value="below">تحت السعر</option>
  </select>

  <input type="number" id="target" placeholder="ادخل السعر">

  <button onclick="addAlert()">إضافة</button>
</div>

<div class="box">
  <div>التنبيهات</div>
  <div id="alerts"></div>
</div>

<script>
// ✅ Proxy لتجاوز الحظر
const API = "https://api.allorigins.win/raw?url=https://api.metals.live/v1/spot/gold";

let alerts = JSON.parse(localStorage.getItem("alerts") || "[]");
let currentPrice = 0;

// جلب السعر
async function getGold(){
  try{
    document.getElementById("status").innerText="جاري التحديث...";

    const res = await fetch(API);
    const data = await res.json();

    currentPrice = data[0][1];

    document.getElementById("price").innerText = currentPrice.toFixed(2);
    document.getElementById("status").innerText="متصل ✔";

    checkAlerts();

  }catch(e){
    document.getElementById("status").innerText="فشل الاتصال ❌";
    console.error(e);
  }
}

// إضافة تنبيه
function addAlert(){
  const dir = document.getElementById("dir").value;
  const price = parseFloat(document.getElementById("target").value);

  if(!price){
    alert("ادخل سعر صحيح");
    return;
  }

  alerts.push({dir, price, done:false});
  save();
  render();
}

// فحص التنبيهات
function checkAlerts(){
  alerts.forEach(a=>{
    if(a.done) return;

    if(a.dir==="above" && currentPrice >= a.price){
      alert("🔥 السعر صعد فوق "+a.price);
      a.done = true;
    }

    if(a.dir==="below" && currentPrice <= a.price){
      alert("🔥 السعر نزل تحت "+a.price);
      a.done = true;
    }
  });

  save();
  render();
}

// عرض التنبيهات
function render(){
  const el = document.getElementById("alerts");

  if(!alerts.length){
    el.innerHTML="لا يوجد تنبيهات";
    return;
  }

  el.innerHTML = alerts.map(a => `
    <div class="alert">
      ${a.dir==="above"?"⬆":"⬇"} ${a.price} ${a.done?"✔":""}
    </div>
  `).join("");
}

// حفظ
function save(){
  localStorage.setItem("alerts", JSON.stringify(alerts));
}

// تشغيل
setInterval(getGold, 30000);
getGold();
render();

</script>

</body>
</html>
