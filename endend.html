<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>🎯 كاشف السيولة الاحترافي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: #e8eaed;
      font-family: Tahoma, sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 14px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    h1 {
      text-align: center;
      color: #ffcc00;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      height: 48px;
      padding: 0 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    input {
      background: #2b2b2b;
      color: #fff;
    }

    button.calc {
      background: #ffcc00;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }

    button.back {
      background: #fbbc04;
      color: #000;
      cursor: pointer;
    }

    .section {
      margin-bottom: 14px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .green { color: #34c759; }
    .red   { color: #ff3b30; }
    .gold  { color: #ffd700; }

    .value {
      font-size: 14px;
      line-height: 1.8;
      font-weight: bold;
    }

    .sniper {
      color: #ffcc00;
      text-shadow: 0 0 6px rgba(255,204,0,0.7);
    }

    hr {
      border: none;
      height: 1px;
      background: #333;
      margin: 18px 0;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🎯 كاشف السيولة الاحترافي</h1>

  <input type="number" id="x" placeholder="أدخل X" step="any">
  <input type="number" id="y" placeholder="أدخل Y" step="any">

  <button class="calc" onclick="calcLiquidity()">تحليل احترافي</button>

  <div id="results"></div>

  <button class="back" onclick="goHome()">🏠 العودة</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

function calcLiquidity() {
  const x = parseFloat(document.getElementById("x").value);
  const y = parseFloat(document.getElementById("y").value);

  if (isNaN(x) || isNaN(y)) {
    alert("يرجى إدخال قيم صحيحة");
    return;
  }

  const a = Math.abs(x - y);

  // نخبة مستويات الدخول (القناص)
  const sniper = [0.618, 0.707, 0.786, 0.886];

  // نخبة الأهداف
  const targets = [1.272, 1.618];

  let html = `<div class="section"><strong>a = ${a.toFixed(4)}</strong></div><hr>`;

  // ====== X ======
  html += buildSection("⬇️ أسفل X (شراء)", "sniper", sniper, l => (x - a * l));
  html += buildSection("⬆️ أعلى X (بيع)", "sniper", sniper, l => (x + a * l));

  html += buildSection("🎯 أهداف صعود من X", "gold", targets, l => (x + a * l));
  html += buildSection("🎯 أهداف هبوط من X", "gold", targets, l => (x - a * l));

  html += `<hr>`;

  // ====== Y ======
  html += buildSection("⬇️ أسفل Y (شراء)", "sniper", sniper, l => (y - a * l));
  html += buildSection("⬆️ أعلى Y (بيع)", "sniper", sniper, l => (y + a * l));

  html += buildSection("🎯 أهداف صعود من Y", "gold", targets, l => (y + a * l));
  html += buildSection("🎯 أهداف هبوط من Y", "gold", targets, l => (y - a * l));

  document.getElementById("results").innerHTML = html;
}

function buildSection(title, color, levels, formula) {
  let html = `<div class="section"><div class="title ${color}">${title}</div>`;
  levels.forEach(l => {
    html += `<div class="value ${color}">${l} → ${formula(l).toFixed(4)}</div>`;
  });
  html += `</div>`;
  return html;
}
</script>

</body>
</html>
